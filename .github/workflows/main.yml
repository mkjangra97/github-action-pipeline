name: NodeJs Project

on:
  push:
    branches:
      -  main

jobs:
  node-env:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node Environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Test Service
        run: npm test --if-present

  build-deploy:
    runs-on: [self-hosted, cssoft]
    needs: node-env
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node Environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - name: Install Pm2 With npm
        run: npm install -g pm2
          
      - name: Start Service As Dev
        run: |
          npm run build
          pm2 start npm --name "my-node" -- run start
          pm2 status
          
