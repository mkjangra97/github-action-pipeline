name: Sample CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  ubuntu-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Custom Build
        run: |
           mkdir -p manish && cd manish
           echo "Manish Kumar Jangra" > manish.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: upload-folder
          path: manish/

  self-hosted-server:
    runs-on: [self-hosted, cssoft]
    needs: ubuntu-server
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: upload-folder
          path: ./manish

      - name: Deploy On Server
        run: |
          cd  manish
          cat manish.txt
